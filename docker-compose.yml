version: '3.8'

services:
  nextjs-app:
    container_name: nextjs_app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production

  nginx:
    container_name: nginx_proxy
    image: nginx:alpine
    restart: always
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443" # Здесь слушается TCP 443
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/www/certbot:ro
    depends_on:
      - nextjs-app

  certbot:
    container_name: certbot_client
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    network_mode: "none"

  # Добавляем Хистерию в общий стек
  hysteria2:
    image: tobyxdd/hysteria:v2
    container_name: hysteria2
    restart: always
    ports:
      - "0.0.0.0:443:443/udp" # Магия: вешаем UDP на тот же 443 порт
    volumes:
      # Маппим файл конфигурации (создай папку ./hysteria/ и положи туда config.yaml)
      - ./hysteria/config.yaml:/etc/hysteria/config.yaml:ro
      # Подключаем тот же volume с сертификатами Let's Encrypt
      - certbot-etc:/etc/letsencrypt:ro
    depends_on:
      - nextjs-app
    command: ["server", "-c", "/etc/hysteria/config.yaml"]

volumes:
  certbot-etc:
  certbot-var: