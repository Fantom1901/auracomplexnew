proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=7d use_temp_path=off;

upstream nextjs_upstream {
    server nextjs_app:3000;
}

# 1. HTTP — редирект на HTTPS и проверка Certbot
server {
    listen 80;
    listen [::]:80;
    server_name твой-домен.ru www.твой-домен.ru;
    server_tokens off;

    # Папка, через которую Certbot будет подтверждать владение доменом
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Все остальные запросы шлем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS — основной сервер
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name auracomplexnew.ru www.auracomplexnew.ru;
    server_tokens off;

    # Пути к сертификатам (Certbot положит их сюда)
    ssl_certificate /etc/letsencrypt/live/auracomplexnew.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auracomplexnew.ru/privkey.pem;

    # Оптимизация SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;

    location /_next/static {
        proxy_cache STATIC;
        proxy_pass http://nextjs_upstream;
    }

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}